# SimCortex segmentation inference config

dataset:
  # Single-dataset mode:
  #   set path to one preprocessed derivative root and keep roots null/empty.
  # Multi-dataset mode:
  #   keep path null and define roots below.
  path: null
  split_file: /project/hippocampus/common/kaveh/workspace/datasets/splits/dataset_split.csv
  split_name: all
  session_label: "01"
  space: "MNI152"
  pad_mult: 16
  roots:
    HCP_YA: /project/hippocampus/common/kaveh/workspace/datasets/hcpya-u100/derivatives/sc-preproc-0.2
    OASIS1: /project/hippocampus/common/kaveh/workspace/datasets/oasis-1/derivatives/sc-preproc-0.2

model:
  in_channels: 1
  out_channels: 9
  features: [16, 32, 64, 128, 128]
  norm: instance
  dropout: 0.10
  ckpt_path: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/checkpoints/seg_best_dice.pt

trainer:
  device: cuda:0
  batch_size: 1
  num_workers: 2
  amp: true

outputs:
  # Single-dataset mode:
  out_root: null
  # Multi-dataset mode:
  out_roots:
    HCP_YA: /project/hippocampus/common/kaveh/workspace/datasets/hcpya-u100/derivatives/sc-seg-0.2
    OASIS1: /project/hippocampus/common/kaveh/workspace/datasets/oasis-1/derivatives/sc-seg-0.2
  log_dir: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/logs_infer_test
  overwrite: false
  overwrite_dataset_description: false
  tensorboard: true

hydra:
  run:
    dir: ${outputs.log_dir}
  output_subdir: null
  job:
    chdir: false

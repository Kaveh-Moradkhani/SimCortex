dataset:
  # Single-dataset mode:
  #   Set dataset.path and outputs.pred_root.
  # Multi-dataset mode:
  #   Keep dataset.path: null and use dataset.roots + outputs.pred_roots.
  path: null
  name: null
  split_file: /project/hippocampus/common/kaveh/workspace/datasets/splits/dataset_split.csv
  split_name: test
  session_label: "01"
  space: MNI152

  roots:
    HCP_YA: /project/hippocampus/common/kaveh/workspace/datasets/hcpya-u100/derivatives/sc-preproc-0.2
    OASIS1: /project/hippocampus/common/kaveh/workspace/datasets/oasis-1/derivatives/sc-preproc-0.2

evaluation:
  num_classes: 9
  exclude_background: true
  eps: 1.0e-6
  compute_nsd: true
  nsd_tolerance_vox: 1.0
  nsd_include_background: false
  spacing: [1.0, 1.0, 1.0]

outputs:
  # Single-dataset prediction root:
  pred_root: null

  # Multi-dataset prediction roots produced by seg/inference.py.
  pred_roots:
    HCP_YA: /project/hippocampus/common/kaveh/workspace/datasets/hcpya-u100/derivatives/sc-seg-0.1
    OASIS1: /project/hippocampus/common/kaveh/workspace/datasets/oasis-1/derivatives/sc-seg-0.1

  log_dir: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/logs_eval_test
  eval_csv: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/metrics_test.csv
  eval_xlsx: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/metrics_test.xlsx
  failed_csv: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/metrics_test_failed.csv
  summary_csv: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/metrics_test_summary_by_dataset.csv
  summary_json: /project/hippocampus/common/kaveh/workspace/sc-runs/seg/exp02_hcpya+oasis1/eval/metrics_test_summary.json

hydra:
  run:
    dir: ${outputs.log_dir}
  output_subdir: null
  job:
    chdir: false
